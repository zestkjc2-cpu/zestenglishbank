<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>제스트 - 내신 변형문제 생성기</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css">
    <script type="module">
        import { supabase } from './supabaseClient.js';
        const { data: { session: authSession } } = await supabase.auth.getSession();
        if (!authSession) window.location.href = 'index.html?login=true';
    </script>
    
    <!-- docx library from CDN for exporting -->
    <script src="https://unpkg.com/docx@8.2.2/build/index.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>

    <style>
        .generator-container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        .input-section {
            background: var(--surface);
            border-radius: 20px;
            padding: 30px;
            box-shadow: var(--shadow-lg);
            margin-bottom: 30px;
            border: 1px solid var(--border);
        }

        .passage-input {
            width: 100%;
            height: 250px;
            padding: 20px;
            border: 1px solid var(--border);
            border-radius: 12px;
            font-family: inherit;
            font-size: 1.05rem;
            line-height: 1.6;
            resize: vertical;
            margin-bottom: 20px;
            background: var(--bg-color);
        }

        .options-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        .option-card {
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 15px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 10px;
            background: var(--surface);
        }

        .option-card:hover {
            border-color: var(--primary-light);
            background: rgba(79, 70, 229, 0.05);
        }

        .option-card.active {
            border-color: var(--primary);
            background: rgba(79, 70, 229, 0.1);
            box-shadow: 0 0 0 2px var(--primary-light);
        }

        .option-card input[type="checkbox"] {
            width: 18px;
            height: 18px;
        }

        .result-section {
            display: none;
            background: var(--surface);
            border-radius: 20px;
            padding: 30px;
            box-shadow: var(--shadow-lg);
            border: 1px solid var(--border);
        }

        .question-item {
            margin-bottom: 40px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border);
        }

        .question-text {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 15px;
            white-space: pre-wrap;
        }

        .passage-box {
            background: #f8fafc;
            padding: 20px;
            border-radius: 8px;
            border-left: 4px solid var(--primary);
            margin-bottom: 15px;
            line-height: 1.8;
            font-size: 1.05rem;
        }

        .blank-word {
            display: inline-block;
            min-width: 80px;
            border-bottom: 2px solid #000;
            margin: 0 4px;
            text-align: center;
        }

        .answer-key {
            margin-top: 20px;
            padding: 15px;
            background: #ecfdf5;
            border-radius: 8px;
            border: 1px solid #10b981;
            color: #065f46;
            font-weight: 600;
        }
    </style>
</head>
<body style="background: var(--bg-color);">
    <header class="header">
        <div class="container nav-container">
            <a href="index.html" class="brand-logo">
                <span class="zest-brand">ZEST ENGLISH BANK</span>
            </a>
            <nav class="main-nav">
                <div class="header-actions">
                    <a href="index.html" class="nav-link outline-link">← 메인으로</a>
                </div>
            </nav>
        </div>
    </header>

    <section style="padding-top: 150px; min-height: 100vh;">
        <div class="container">
            <div class="generator-container">
                <div class="section-header text-center" style="margin-bottom: 40px;">
                    <h2 class="section-title">내신 대비 <span class="text-orange">변형문제 생성기</span></h2>
                    <p class="section-desc">영어 지문을 입력하면 다양한 유형의 내신 변형문제를 자동으로 만들어줍니다.</p>
                </div>

                <div class="input-section glass-card">
                    <h3 style="margin-bottom: 15px;">1. 영어 지문 입력</h3>
                    <textarea class="passage-input" id="passageInput" placeholder="이곳에 영어 지문을 입력하거나 붙여넣으세요..."></textarea>
                    
                    <h3 style="margin-bottom: 15px;">2. 생성할 문제 유형 선택</h3>
                    <div class="options-grid">
                        <div class="option-card active" data-type="blank">
                            <input type="checkbox" checked readonly>
                            <div>
                                <strong>빈칸 추론</strong>
                                <p style="font-size: 0.85rem; color: var(--text-muted); margin: 0;">주요 어휘 빈칸 처리</p>
                            </div>
                        </div>
                        <div class="option-card" data-type="grammar">
                            <input type="checkbox">
                            <div>
                                <strong>어법 선택</strong>
                                <p style="font-size: 0.85rem; color: var(--text-muted); margin: 0;">올바른 어법 고르기</p>
                            </div>
                        </div>
                        <div class="option-card" data-type="ordering">
                            <input type="checkbox">
                            <div>
                                <strong>문장 배열</strong>
                                <p style="font-size: 0.85rem; color: var(--text-muted); margin: 0;">단어 순서 배열하기</p>
                            </div>
                        </div>
                    </div>

                    <button class="btn btn-gradient btn-large" id="generateBtn" style="width: 100%;">변형문제 생성하기 🚀</button>
                </div>

                <div class="result-section" id="resultSection">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
                        <h3 id="resultTitle">생성된 변형문제</h3>
                        <button class="btn btn-outline" id="exportBtn">Word 파일로 저장 📥</button>
                    </div>
                    <div id="questionsContainer">
                        <!-- Questions will be injected here -->
                    </div>
                </div>
            </div>
        </div>
    </section>

    <script src="question_gen.js" type="module"></script>
</body>
</html>
