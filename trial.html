<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>제스트 영어 문제은행 - 자료실</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css">
    <script>
        (function() {
            try {
                const sessionStr = localStorage.getItem('sb-kdyjvqjzmbknfntmgiqr-auth-token');
                if (sessionStr) {
                    const session = JSON.parse(sessionStr);
                    if (session && session.access_token) {
                        document.documentElement.classList.add('logged-in');
                    }
                }
            } catch (e) {}
        })();
    </script>
    <script type="module">
        import { supabase } from './supabaseClient.js';
        const { data: { session: initialSession } } = await supabase.auth.getSession();
        if (!initialSession) window.location.href = 'index.html?login=true';
    </script>
    <style>
        .trial-page-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 24px;
            max-width: 800px;
            margin: 0 auto;
        }
        
        @media (min-width: 768px) {
            .trial-page-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }
        
        .trial-page-btn {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 40px 20px;
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--text-main);
            text-decoration: none;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: var(--shadow-md);
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            line-height: 1.4;
        }

        .trial-page-btn:hover {
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            color: var(--white);
            transform: translateY(-8px);
            box-shadow: var(--shadow-lg);
            border-color: transparent;
        }

        /* Search Section Tweaks */
        .search-hero {
            max-width: 800px;
            margin: 0 auto;
            padding: 40px;
            text-align: center;
        }

        .search-box-large {
            background: rgba(255, 255, 255, 0.9);
            padding: 10px;
            border-radius: 16px;
            box-shadow: var(--shadow-lg);
            display: flex;
            gap: 12px;
            margin-top: 30px;
        }

        .search-input-large {
            flex: 1;
            padding: 16px 24px;
            border-radius: 12px;
            border: 1px solid var(--border);
            font-size: 1.1rem;
            outline: none;
            transition: 0.3s;
        }

        .search-input-large:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1);
        }

        .btn-search-large {
            padding: 0 40px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 1.1rem;
        }
    </style>
</head>
<body style="background: var(--bg-color);">
    <header class="header">
        <div class="container nav-container">
            <a href="index.html" class="brand-logo" style="display: flex; align-items: center; gap: 8px;">
                <span class="zest-brand">ZEST ENGLISH BANK</span>
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="home-icon"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
            </a>
            <nav class="main-nav">
                <div class="header-actions">
                    <a href="#" class="nav-link primary-btn" id="loginBtn">Login</a>
                </div>
            </nav>
        </div>
    </header>

    <section class="features-section" style="padding-top: 150px; min-height: 100vh;">
        <div class="container">
            <div class="section-header text-center">
                <h2 class="section-title">자료실</h2>
                <p class="section-desc">제스트 영어 은행의 최신 학습 자료를 검색하고 다운로드하세요.</p>
            </div>
            
            <div class="search-hero glass-card">
                <h3 style="font-size: 1.8rem; margin-bottom: 10px; color: var(--text-main);">교재 및 자료 검색</h3>
                <p style="color: var(--text-muted); margin-bottom: 20px;">공식 교재 및 분야별 맞춤형 자료를 한눈에 찾아보실 수 있습니다.</p>
                
                <div class="search-box-large">
                    <input type="text" id="searchInput" placeholder="교재 이름이나 검색어를 입력하세요..." class="search-input-large">
                    <button id="searchBtn" class="btn btn-gradient btn-search-large">검색</button>
                </div>
            </div>
        </div>
    </section>

    <!-- Search Results Modal -->
    <div class="modal-overlay" id="searchResultsModal">
        <div class="glass-modal modal-wide">
            <button class="close-modal">&times;</button>
            <div class="modal-header">
                <h2>자료 검색 결과</h2>
                <p id="searchCount">자료실에서 검색된 내역입니다.</p>
            </div>
            <div class="search-results-container">
                <table class="board-table">
                    <thead>
                        <tr>
                            <th width="10%">번호</th>
                            <th width="60%">제목</th>
                            <th width="30%">다운로드</th>
                        </tr>
                    </thead>
                    <tbody id="searchResultsContent">
                        <!-- Results will be injected here -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Modals (Hidden by default) -->
    <div class="modal-overlay" id="loginModal">
        <div class="modal-content glass-modal">
            <button class="close-modal">&times;</button>
            <div class="modal-header">
                <h2>회원 로그인</h2>
                <p>제스트 영어 문제은행에 오신 것을 환영합니다.</p>
            </div>
            <form class="login-form" id="loginForm">
                <div class="input-group">
                    <label>이메일</label>
                    <input type="email" id="loginEmail" placeholder="email@example.com" required>
                </div>
                <div class="input-group">
                    <label>비밀번호</label>
                    <input type="password" id="loginPassword" placeholder="Password" required>
                </div>
                <p id="loginError" style="color:red;font-size:0.88rem;margin:4px 0 0 0;"></p>
                <button type="submit" class="btn btn-gradient btn-full">로그인</button>
                
                <div class="social-login-divider">
                    <span>또는</span>
                </div>
                <div class="social-login-actions">
                    <button type="button" class="btn btn-social btn-zest" id="signupZest">
                        제스트 회원가입하기
                    </button>
                    <button type="button" class="btn btn-social btn-google" id="loginGoogle">
                        <img src="https://www.google.com/favicon.ico" alt="Google" class="social-icon"> 구글로 로그인하기
                    </button>
                    <button type="button" class="btn btn-social btn-naver" id="loginNaver">
                        <img src="https://www.naver.com/favicon.ico" alt="Naver" class="social-icon"> 네이버로 가입하기
                    </button>
                </div>
                <div style="margin-top: 20px; text-align: center;">
                    <a href="admin.html" style="font-size: 0.9rem; font-weight: 600; color: var(--text-muted); text-decoration: underline;">관리자 로그인</a>
                </div>
            </form>
        </div>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
