<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>제스트 영어 문제은행 - 무료 체험장</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css">
    <style>
        .trial-page-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 24px;
            max-width: 800px;
            margin: 0 auto;
        }
        
        @media (min-width: 768px) {
            .trial-page-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }
        
        .trial-page-btn {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 40px 20px;
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--text-main);
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: var(--shadow-md);
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            line-height: 1.4;
        }

        .trial-page-btn:hover {
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            color: var(--white);
            transform: translateY(-8px);
            box-shadow: var(--shadow-lg);
            border-color: transparent;
        }
    </style>
</head>
<body style="background: var(--bg-color);">
    <header class="header">
        <div class="container nav-container">
            <a href="index.html" class="brand-logo">
                <span class="zest-brand">ZEST ENGLISH BANK</span>
            </a>
            <nav class="main-nav">
                <ul class="nav-list">
                    <li><a href="index.html" class="nav-link">돌아가기</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <section class="features-section" style="padding-top: 150px; min-height: 100vh;">
        <div class="container">
            <div class="section-header text-center">
                <div class="badge">FREE TRIAL</div>
                <h2 class="section-title">무료 체험장</h2>
                <p class="section-desc">제스트의 프리미엄 문제은행 시스템을 무료 체험해보세요.</p>
            </div>
            
            <div class="trial-page-grid">
                <button class="trial-page-btn">어휘자료</button>
                <button class="trial-page-btn">내신정복</button>
                <button class="trial-page-btn">최다오답15</button>
                <button class="trial-page-btn">모의고사</button>
                <button class="trial-page-btn">중등교과서</button>
                <button class="trial-page-btn">고등교과서</button>
            </div>
        </div>
    </section>
</body>
</html>
