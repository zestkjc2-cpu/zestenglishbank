<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>제스트 영어 문제은행 - 자료실</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css">
    <style>
        .trial-page-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 24px;
            max-width: 800px;
            margin: 0 auto;
        }
        
        @media (min-width: 768px) {
            .trial-page-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }
        
        .trial-page-btn {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 40px 20px;
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--text-main);
            text-decoration: none;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: var(--shadow-md);
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            line-height: 1.4;
        }

        .trial-page-btn:hover {
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            color: var(--white);
            transform: translateY(-8px);
            box-shadow: var(--shadow-lg);
            border-color: transparent;
        }
    </style>
</head>
<body style="background: var(--bg-color);">
    <header class="header">
        <div class="container nav-container">
            <a href="index.html" class="brand-logo" style="display: flex; align-items: center; gap: 8px;">
                <span class="zest-brand">ZEST ENGLISH BANK</span>
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="var(--primary)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="home-icon"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
            </a>
            <nav class="main-nav">
                <ul class="nav-list">
                    <li><a href="board.html?category=Manual" class="nav-link outline-link">사용매뉴얼</a></li>
                    <li><a href="index.html" class="nav-link outline-link">돌아가기</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <section class="features-section" style="padding-top: 150px; min-height: 100vh;">
        <div class="container">
            <div class="section-header text-center">

                <h2 class="section-title">자료실</h2>
                <p class="section-desc">제스트 영어 은행의 학습 자료와 문제들을 다운로드 받으실 수 있습니다.</p>
            </div>
            
            <div class="trial-page-grid">
                <a href="board.html?category=Vocabulary" class="trial-page-btn">어휘</a>
                <a href="board.html?category=School" class="trial-page-btn">내신정복</a>
                <a href="board.html?category=Mistakes" class="trial-page-btn">최다오답15</a>
                <a href="board.html?category=Mock" class="trial-page-btn">모의고사</a>
                <a href="board.html?category=Middle" class="trial-page-btn">중등교과서</a>
                <a href="board.html?category=High" class="trial-page-btn">고등교과서</a>
            </div>
        </div>
    </section>

    <script type="module">
        import { supabase } from './supabaseClient.js';
        
        document.addEventListener('DOMContentLoaded', async () => {
            const { data: { session } } = await supabase.auth.getSession();
            
            const trialBtns = document.querySelectorAll('.trial-page-btn');
            trialBtns.forEach(btn => {
                btn.addEventListener('click', (e) => {
                    if (!session) {
                        e.preventDefault();
                        alert('로그인이 필요한 서비스입니다.');
                        window.location.href = 'admin.html';
                    }
                });
            });

            // Also check '사용매뉴얼' link in header
            const manualLink = document.querySelector('a[href*="category=Manual"]');
            if (manualLink) {
                manualLink.addEventListener('click', (e) => {
                    if (!session) {
                        e.preventDefault();
                        alert('로그인이 필요한 서비스입니다.');
                        window.location.href = 'admin.html';
                    }
                });
            }
        });
    </script>
</body>
</html>
