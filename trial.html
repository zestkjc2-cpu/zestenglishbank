<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>제스트 영어 문제은행 - 자료실</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css">
    <style>
        .trial-page-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 24px;
            max-width: 800px;
            margin: 0 auto;
        }
        
        @media (min-width: 768px) {
            .trial-page-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }
        
        .trial-page-btn {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 40px 20px;
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--text-main);
            text-decoration: none;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: var(--shadow-md);
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            line-height: 1.4;
        }

        .trial-page-btn:hover {
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            color: var(--white);
            transform: translateY(-8px);
            box-shadow: var(--shadow-lg);
            border-color: transparent;
        }
    </style>
</head>
<body style="background: var(--bg-color);">
    <header class="header">
        <div class="container nav-container">
            <a href="index.html" class="brand-logo" style="display: flex; align-items: center; gap: 8px;">
                <span class="zest-brand">ZEST ENGLISH BANK</span>
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="var(--primary)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="home-icon"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
            </a>
            <nav class="main-nav">
                <div class="header-actions">
                    <a href="#" class="nav-link primary-btn" id="loginBtn">Login</a>
                </div>
            </nav>
        </div>
    </header>

    <section class="features-section" style="padding-top: 150px; min-height: 100vh;">
        <div class="container">
            <div class="section-header text-center">

                <h2 class="section-title">자료실</h2>
                <p class="section-desc">제스트 영어 은행의 학습 자료와 문제들을 다운로드 받으실 수 있습니다.</p>
            </div>
            
            <div class="trial-page-grid">
                <a href="board.html?category=Vocabulary" class="trial-page-btn">어휘</a>
                <a href="board.html?category=School" class="trial-page-btn">내신정복</a>
                <a href="board.html?category=Mistakes" class="trial-page-btn">최다오답15</a>
                <a href="board.html?category=Mock" class="trial-page-btn">모의고사</a>
                <a href="board.html?category=Middle" class="trial-page-btn">중등교과서</a>
                <a href="board.html?category=High" class="trial-page-btn">고등교과서</a>
            </div>
        </div>
    </section>

    <!-- Modals (Hidden by default) -->
    <div class="modal-overlay" id="loginModal">
        <div class="modal-content glass-modal">
            <button class="close-modal">&times;</button>
            <div class="modal-header">
                <h2>회원 로그인</h2>
                <p>제스트 영어 문제은행에 오신 것을 환영합니다.</p>
            </div>
            <form class="login-form" id="loginForm">
                <div class="input-group">
                    <label>이메일</label>
                    <input type="email" id="loginEmail" placeholder="email@example.com" required>
                </div>
                <div class="input-group">
                    <label>비밀번호</label>
                    <input type="password" id="loginPassword" placeholder="Password" required>
                </div>
                <p id="loginError" style="color:red;font-size:0.88rem;margin:4px 0 0 0;"></p>
                <button type="submit" class="btn btn-gradient btn-full">로그인</button>
                
                <div class="social-login-divider">
                    <span>또는</span>
                </div>
                <div class="social-login-actions">
                    <button type="button" class="btn btn-social btn-zest" id="signupZest">
                        제스트 회원가입하기
                    </button>
                    <button type="button" class="btn btn-social btn-google" id="loginGoogle">
                        <img src="https://www.google.com/favicon.ico" alt="Google" class="social-icon"> 구글로 로그인하기
                    </button>
                    <button type="button" class="btn btn-social btn-naver" id="loginNaver">
                        <img src="https://www.naver.com/favicon.ico" alt="Naver" class="social-icon"> 네이버로 가입하기
                    </button>
                </div>
                <div style="margin-top: 20px; text-align: center;">
                    <a href="admin.html" style="font-size: 0.9rem; font-weight: 600; color: var(--text-muted); text-decoration: underline;">관리자 로그인</a>
                </div>
            </form>
        </div>
    </div>

    <script type="module" src="app.js"></script>
    <script type="module">
        import { supabase } from './supabaseClient.js';
        
        document.addEventListener('DOMContentLoaded', async () => {
            const { data: { session } } = await supabase.auth.getSession();
            const loginModal = document.getElementById('loginModal');
            
            const trialBtns = document.querySelectorAll('.trial-page-btn');
            trialBtns.forEach(btn => {
                btn.addEventListener('click', (e) => {
                    if (!session) {
                        e.preventDefault();
                        if (loginModal) loginModal.classList.add('active');
                    }
                });
            });

            const manualLink = document.querySelector('a[href*="category=Manual"]');
            if (manualLink) {
                manualLink.addEventListener('click', (e) => {
                    if (!session) {
                        e.preventDefault();
                        if (loginModal) loginModal.classList.add('active');
                    }
                });
            }
        });
    </script>
</body>
</html>
