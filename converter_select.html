<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>제스트 - 변환 방식 선택</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css">
    <script>
        (function() {
            try {
                const sessionStr = localStorage.getItem('sb-kdyjvqjzmbknfntmgiqr-auth-token');
                if (sessionStr) {
                    const session = JSON.parse(sessionStr);
                    if (session && session.access_token) {
                        document.documentElement.classList.add('logged-in');
                    }
                }
            } catch (e) {}
        })();
    </script>
    <script type="module">
        import { supabase } from './supabaseClient.js';
        const { data: { session } } = await supabase.auth.getSession();
        if (!session) window.location.href = 'index.html?login=true';
    </script>
    <style>
        .select-container {
            max-width: 900px;
            margin: 0 auto;
            padding: 40px 20px;
            text-align: center;
        }
        .mode-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 24px;
            margin-top: 40px;
        }
        .mode-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 48px 32px;
            text-align: center;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-decoration: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            position: relative;
            overflow: hidden;
        }
        .mode-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, rgba(79, 70, 229, 0.05), rgba(79, 70, 229, 0));
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        .mode-card:hover {
            transform: translateY(-10px);
            border-color: var(--primary);
            box-shadow: var(--shadow-xl);
        }
        .mode-card:hover::before {
            opacity: 1;
        }
        .mode-icon {
            font-size: 4rem;
            background: var(--bg-color);
            width: 100px;
            height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 24px;
            box-shadow: var(--shadow-sm);
        }
        .mode-title {
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--text-main);
        }
        .mode-desc {
            color: var(--text-muted);
            font-size: 0.95rem;
            line-height: 1.6;
        }
        @media (max-width: 640px) {
            .mode-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="container nav-container">
            <a href="index.html" class="brand-logo">
                <span class="zest-brand">ZEST ENGLISH BANK</span>
            </a>
            <nav class="main-nav">
                <div class="header-actions">
                    <a href="index.html" class="nav-link outline-link">← 메인으로</a>
                </div>
            </nav>
        </div>
    </header>

    <section style="padding-top: 150px; min-height: 100vh;">
        <div class="container">
            <div class="select-container">
                <div class="section-header">
                    <h2 class="section-title">PDF <span class="text-orange">변환 방식</span> 선택</h2>
                    <p class="section-desc">변환하고자 하는 파일 형식을 선택해 주세요.</p>
                </div>

                <div class="mode-grid">
                    <a href="converter.html" class="mode-card glass-card">
                        <div class="mode-icon">Ⓜ️</div>
                        <div class="mode-title">워드 파일 (docx) 변환</div>
                        <p class="mode-desc">MS Word에서 편집 가능한<br>문서 형식으로 변환합니다.</p>
                        <span class="btn btn-gradient" style="padding: 10px 24px;">선택하기</span>
                    </a>

                    <a href="converter_hwpx.html" class="mode-card glass-card">
                        <div class="mode-icon">🇰</div>
                        <div class="mode-title">한글 파일 (hwpx) 변환</div>
                        <p class="mode-desc">한글(HWP)에서 편집 가능한<br>개방형 문서 형식으로 변환합니다.</p>
                        <span class="btn btn-outline" style="padding: 10px 24px;">선택하기</span>
                    </a>
                </div>
            </div>
        </div>
    </section>
</body>
</html>
