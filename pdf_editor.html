<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>제스트 - PDF 편집 도구</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css">
    
    <!-- PDF-Lib for local processing -->
    <script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>

    <script>
        (function() {
            try {
                const sessionStr = localStorage.getItem('sb-kdyjvqjzmbknfntmgiqr-auth-token');
                if (sessionStr) {
                    const session = JSON.parse(sessionStr);
                    if (session && session.access_token) {
                        document.documentElement.classList.add('logged-in');
                    }
                }
            } catch (e) {}
        })();
    </script>
    <script type="module">
        import { supabase } from './supabaseClient.js';
        const { data: { session } } = await supabase.auth.getSession();
        if (!session) window.location.href = 'index.html?login=true';
    </script>

    <style>
        .editor-container {
            max-width: 800px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        .tool-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }

        .tool-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 30px;
            transition: all 0.3s ease;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            gap: 15px;
            position: relative;
        }

        .tool-card:hover {
            border-color: var(--primary);
            box-shadow: var(--shadow-lg);
            transform: translateY(-5px);
        }

        .tool-icon {
            font-size: 2.5rem;
            margin-bottom: 5px;
        }

        .tool-title {
            font-size: 1.25rem;
            font-weight: 700;
        }

        .tool-desc {
            color: var(--text-muted);
            font-size: 0.9rem;
            line-height: 1.5;
        }

        .active-tool-area {
            display: none;
            margin-top: 40px;
            animation: fadeIn 0.4s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .drop-zone {
            height: 200px;
            border: 2px dashed var(--border);
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: var(--surface-light);
            cursor: pointer;
            transition: 0.3s;
            margin-top: 15px;
        }

        .drop-zone:hover { border-color: var(--primary); background: rgba(79, 70, 229, 0.05); }

        .file-list {
            margin-top: 20px;
            background: var(--surface);
            border-radius: 12px;
            border: 1px solid var(--border);
            overflow: hidden;
        }

        .file-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 20px;
            border-bottom: 1px solid var(--border);
        }

        .file-item:last-child { border-bottom: none; }

        .delete-btn {
            color: #ef4444;
            cursor: pointer;
            padding: 5px;
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="container nav-container">
            <a href="index.html" class="brand-logo">
                <span class="zest-brand">ZEST ENGLISH BANK</span>
            </a>
            <nav class="main-nav">
                <div class="header-actions">
                    <a href="index.html" class="nav-link outline-link">← 뒤로가기</a>
                </div>
            </nav>
        </div>
    </header>

    <section style="padding-top: 150px; min-height: 100vh;">
        <div class="container">
            <div class="editor-container">
                <div class="section-header text-center">
                    <h2 class="section-title">PDF <span class="text-orange">편집 도구</span></h2>
                    <p class="section-desc">파일 합치기, 페이지 삭제 등 필요한 편집 작업을 로컬에서 안전하게 처리하세요.</p>
                </div>

                <div class="tool-grid" id="toolGrid">
                    <div class="tool-card glass-card" onclick="showTool('merge')">
                        <div class="tool-icon">🔗</div>
                        <div class="tool-title">PDF 합치기</div>
                        <p class="tool-desc">여러 개의 PDF 파일을 하나의 파일로 결합합니다.</p>
                    </div>
                </div>

                <!-- Merge Tool Area -->
                <div id="mergeArea" class="active-tool-area">
                    <div class="glass-card" style="padding: 30px;">
                        <h3 style="margin-bottom: 15px;">PDF 합치기</h3>
                        <div class="drop-zone" onclick="document.getElementById('mergeFiles').click()">
                            <span style="font-size: 2rem;">📁</span>
                            <p style="font-weight: 600; margin-top: 10px;">파일들을 이곳으로 끌어다 놓거나 클릭하여 선택하세요.</p>
                            <input type="file" id="mergeFiles" multiple accept="application/pdf" style="display: none">
                        </div>
                        
                        <div id="mergeFileList" class="file-list" style="display: none;"></div>

                        <button id="runMergeBtn" class="btn btn-gradient" style="width: 100%; margin-top: 20px; display: none;">파일 합치기 및 다운로드 🚀</button>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <script>
        let mergeFiles = [];

        function showTool(tool) {
            document.getElementById('toolGrid').style.display = 'none';
            document.getElementById(tool + 'Area').style.display = 'block';
        }

        const mergeInput = document.getElementById('mergeFiles');
        const mergeListEl = document.getElementById('mergeFileList');
        const runMergeBtn = document.getElementById('runMergeBtn');

        mergeInput.addEventListener('change', (e) => {
            const files = Array.from(e.target.files);
            mergeFiles = [...mergeFiles, ...files];
            updateMergeList();
        });

        function updateMergeList() {
            if (mergeFiles.length === 0) {
                mergeListEl.style.display = 'none';
                runMergeBtn.style.display = 'none';
                return;
            }

            mergeListEl.style.display = 'block';
            runMergeBtn.style.display = 'block';
            mergeListEl.innerHTML = mergeFiles.map((f, i) => `
                <div class="file-item">
                    <span>${i+1}. ${f.name}</span>
                    <span class="delete-btn" onclick="removeFile(${i})">삭제</span>
                </div>
            `).join('');
        }

        window.removeFile = (index) => {
            mergeFiles.splice(index, 1);
            updateMergeList();
        };

        runMergeBtn.addEventListener('click', async () => {
            if (mergeFiles.length < 2) {
                alert('최소 2개 이상의 파일을 선택해 주세요.');
                return;
            }

            try {
                runMergeBtn.disabled = true;
                runMergeBtn.textContent = '처리 중...';

                const mergedPdf = await PDFLib.PDFDocument.create();
                
                for (const file of mergeFiles) {
                    const bytes = await file.arrayBuffer();
                    const pdf = await PDFLib.PDFDocument.load(bytes);
                    const pages = await mergedPdf.copyPages(pdf, pdf.getPageIndices());
                    pages.forEach(p => mergedPdf.addPage(p));
                }

                const mergedBytes = await mergedPdf.save();
                saveAs(new Blob([mergedBytes]), 'merged_document.pdf');
                
                runMergeBtn.disabled = false;
                runMergeBtn.textContent = '파일 합치기 및 다운로드 🚀';
            } catch (err) {
                console.error(err);
                alert('오류가 발생했습니다: ' + err.message);
                runMergeBtn.disabled = false;
                runMergeBtn.textContent = '파일 합치기 및 다운로드 🚀';
            }
        });
    </script>
</body>
</html>
