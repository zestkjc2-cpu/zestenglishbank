<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>제스트 영어 문제은행 - 게시판</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css">
    <style>
        .board-container {
            max-width: 1000px;
            margin: 0 auto;
            background: var(--surface);
            border-radius: 16px;
            padding: 30px;
            box-shadow: var(--shadow-lg);
        }

        .board-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid var(--border);
        }

        .board-title {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text-main);
        }

        .board-table {
            width: 100%;
            border-collapse: collapse;
            text-align: center;
        }

        .board-table th, .board-table td {
            padding: 16px 12px;
            border-bottom: 1px solid var(--border);
        }

        .board-table th {
            background: #f8fafc;
            color: var(--text-muted);
            font-weight: 600;
            font-size: 0.95rem;
        }

        .board-table td.title-cell {
            text-align: left;
            font-weight: 500;
            color: var(--text-main);
        }

        .board-table tr:hover {
            background: #f1f5f9;
        }

        .download-btn {
            background: var(--surface);
            border: 1px solid var(--primary);
            color: var(--primary);
            padding: 6px 16px;
            border-radius: 6px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .download-btn:hover {
            background: var(--primary);
            color: white;
        }

        .badge-type {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 600;
            margin-right: 8px;
        }

        .badge-hwp { background: #e0f2fe; color: #0284c7; }
        .badge-pdf { background: #fee2e2; color: #dc2626; }

    </style>
</head>
<body style="background: var(--bg-color);">
    <header class="header">
        <div class="container nav-container">
            <a href="index.html" class="brand-logo">
                <span class="zest-brand">ZEST ENGLISH BANK</span>
            </a>
            <nav class="main-nav">
                <ul class="nav-list">
                    <li><a href="trial.html" class="nav-link">자료실로 돌아가기</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <section style="padding-top: 150px; min-height: 100vh;">
        <div class="container">
            <div class="board-container">
                <div class="board-header">
                    <div class="board-title" id="boardCategoryTitle">게시판 자료실</div>
                    <div class="board-search">
                        <input type="text" placeholder="문서 검색..." style="padding: 8px 12px; border: 1px solid var(--border); border-radius: 6px;">
                        <button class="btn btn-gradient" style="padding: 8px 16px;">검색</button>
                    </div>
                </div>

                <table class="board-table">
                    <thead>
                        <tr>
                            <th width="8%">번호</th>
                            <th width="60%">제목</th>
                            <th width="12%">등록일</th>
                            <th width="20%">다운로드</th>
                        </tr>
                    </thead>
                    <tbody id="boardContent">
                        <!-- Content populated by JS -->
                    </tbody>
                </table>
            </div>
        </div>
    </section>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const categoryMap = {
                'Vocabulary': '어휘자료',
                'School': '내신정복',
                'Mistakes': '최다오답15',
                'Mock': '모의고사',
                'Middle': '중등교과서',
                'High': '고등교과서'
            };

            const catKey = urlParams.get('category') || 'Vocabulary';
            const catName = categoryMap[catKey] || '자료실';
            
            document.getElementById('boardCategoryTitle').innerText = `${catName} 게시판`;

            // Generate mock data
            const tbody = document.getElementById('boardContent');
            for(let i=1; i<=5; i++) {
                const tr = document.createElement('tr');
                const isPdf = i % 2 === 0;
                const badgeClass = isPdf ? 'badge-pdf' : 'badge-hwp';
                const badgeText = isPdf ? 'PDF' : 'HWP';

                let titleExt = isPdf ? '최종_문제지.pdf' : '학습지_원본.hwp';
                
                tr.innerHTML = `
                    <td>${6 - i}</td>
                    <td class="title-cell"><span class="badge-type ${badgeClass}">${badgeText}</span> [${catName}] 제 ${6-i}회차 기출 예상문제 모음</td>
                    <td>2026-03-${10 + i}</td>
                    <td>
                        <button class="download-btn" onclick="alert('${catName} 문서를 다운로드합니다.')">↓ 다운로드</button>
                    </td>
                `;
                tbody.appendChild(tr);
            }
        });
    </script>
</body>
</html>
