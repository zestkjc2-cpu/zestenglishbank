<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>제스트 영어 문제은행 - 자료실</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css">
    <style>
        .board-container {
            max-width: 1000px; margin: 0 auto; background: var(--surface);
            border-radius: 16px; padding: 30px; box-shadow: var(--shadow-lg);
        }
        .board-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 20px; padding-bottom: 15px; border-bottom: 2px solid var(--border);
            flex-wrap: wrap; gap: 10px;
        }
        .board-title { font-size: 1.5rem; font-weight: 700; color: var(--text-main); }
        .board-table { width: 100%; border-collapse: collapse; text-align: center; }
        .board-table th, .board-table td { padding: 16px 12px; border-bottom: 1px solid var(--border); }
        .board-table th { background: #f8fafc; color: var(--text-muted); font-weight: 600; font-size: 0.95rem; }
        .board-table td.title-cell { text-align: left; font-weight: 500; color: var(--text-main); }
        .board-table tr:hover { background: #f1f5f9; }
        .download-btn {
            background: var(--surface); border: 1px solid var(--primary); color: var(--primary);
            padding: 6px 16px; border-radius: 6px; font-size: 0.85rem; font-weight: 600;
            cursor: pointer; transition: all 0.2s; text-decoration: none; display: inline-block;
        }
        .download-btn:hover { background: var(--primary); color: white; }
        .badge-type { display: inline-block; padding: 4px 8px; border-radius: 4px; font-size: 0.75rem; font-weight: 600; margin-right: 8px; }
        .badge-hwp { background: #e0f2fe; color: #0284c7; }
        .badge-pdf { background: #fee2e2; color: #dc2626; }
        .badge-docx { background: #f3e8ff; color: #7c3aed; }
        .loading-msg { text-align: center; padding: 40px; color: var(--text-muted); }

        /* Admin Upload Panel */
        .admin-upload-panel {
            background: linear-gradient(135deg, #eff6ff, #dbeafe);
            border: 1.5px solid var(--primary);
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 28px;
        }
        .admin-upload-panel h3 { margin-bottom: 16px; font-size: 1.1rem; color: var(--primary); }
        .upload-row { display: flex; gap: 12px; flex-wrap: wrap; }
        .upload-row input[type="text"],
        .upload-row select,
        .upload-row input[type="file"] {
            flex: 1; min-width: 160px; padding: 10px 12px;
            border: 1px solid var(--border); border-radius: 8px;
            font-size: 0.95rem; background: white; color: var(--text-main);
        }
        .status-msg { margin-top: 10px; font-size: 0.9rem; font-weight: 600; }
        .status-msg.ok { color: #16a34a; }
        .status-msg.err { color: #dc2626; }
        .admin-bar {
            display: flex; align-items: center; justify-content: space-between;
            padding: 10px 16px; background: #dbeafe; border-radius: 8px;
            margin-bottom: 16px; font-size: 0.9rem; color: var(--primary); font-weight: 600;
        }
        .admin-bar button { font-size: 0.8rem; padding: 4px 12px; }
        .delete-btn {
            background: #fff1f2; color: #e11d48; border: 1px solid #fda4af;
            padding: 6px 12px; border-radius: 6px; font-size: 0.85rem; font-weight: 600;
            cursor: pointer; transition: all 0.2s; margin-left: 6px; display: inline-block;
            text-decoration: none;
        }
        .delete-btn:hover { background: #e11d48; color: white; border-color: #e11d48; }
        .lock-btn {
            background: #f1f5f9; color: #64748b; border: 1px solid #e2e8f0;
            padding: 6px 16px; border-radius: 6px; font-size: 0.85rem; font-weight: 600;
            cursor: pointer; text-decoration: none; display: inline-block;
        }
    </style>
</head>
<body style="background: var(--bg-color);">
    <header class="header">
        <div class="container nav-container">
            <a href="index.html" class="brand-logo" style="display: flex; align-items: center; gap: 8px;">
                <span class="zest-brand">ZEST ENGLISH BANK</span>
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="var(--primary)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="home-icon"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
            </a>
            <nav class="main-nav">
                <div class="header-actions">
                    <a href="#" class="nav-link primary-btn" id="loginBtn">Login</a>
                </div>
            </nav>
        </div>
    </header>

    <section style="padding-top: 150px; min-height: 100vh;">
        <div class="container">
            <div class="board-container">

                <!-- Admin bar (visible when logged in) -->
                <div class="admin-bar" id="adminBar" style="display:none;">
                    <span id="adminBarEmail">👤 관리자 모드</span>
                    <button class="btn btn-outline" id="logoutBtn">로그아웃</button>
                </div>

                <!-- Admin Upload Panel (visible when logged in) -->
                <div class="admin-upload-panel" id="adminUploadPanel" style="display:none;">
                    <h3>📤 자료 업로드 (관리자)</h3>
                    <form id="uploadForm">
                        <div class="upload-row">
                            <input type="text" id="fileTitle" placeholder="제목 (여러 개 선택 시 파일명 사용)">
                            <select id="fileCategory" required>
                                <option value="">카테고리 선택</option>
                                <option value="Manual">사용매뉴얼</option>
                                <option value="Vocabulary">어휘</option>
                                <option value="School">내신정복</option>
                                <option value="Mistakes">최다오답15</option>
                                <option value="Mock">모의고사</option>
                                <option value="Middle">중등교과서</option>
                                <option value="High">고등교과서</option>
                            </select>
                            <input type="file" id="fileInput" accept=".pdf,.hwp,.docx" required multiple>
                            <button type="submit" class="btn btn-gradient">업로드</button>
                            <button type="button" class="btn btn-outline" id="deleteSelectedBtn" style="color: #e11d48; border-color: #fda4af;">선택 삭제</button>
                        </div>
                        <p id="uploadStatus" class="status-msg"></p>
                    </form>
                </div>

                <div class="board-header">
                    <div class="board-title" id="boardCategoryTitle">자료실</div>
                    <div style="display:flex; gap:8px;">
                        <input type="text" id="searchInput" placeholder="문서 검색..." style="padding: 8px 12px; border: 1px solid var(--border); border-radius: 6px;">
                        <button class="btn btn-gradient" style="padding: 8px 16px;" id="searchBtn">검색</button>
                    </div>
                </div>

                <table class="board-table">
                    <thead>
                        <tr id="tableHeader">
                            <th width="5%" id="checkCol" style="display:none;"><input type="checkbox" id="selectAll"></th>
                            <th width="8%">번호</th>
                            <th width="52%">제목</th>
                            <th width="15%">등록일</th>
                            <th width="20%">다운로드</th>
                        </tr>
                    </thead>
                    <tbody id="boardContent">
                        <tr><td colspan="4" class="loading-msg">📂 자료를 불러오는 중...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </section>

    <!-- Modals (Hidden by default) -->
    <div class="modal-overlay" id="loginModal">
        <div class="modal-content glass-modal">
            <button class="close-modal">&times;</button>
            <div class="modal-header">
                <h2>회원 로그인</h2>
                <p>제스트 영어 문제은행에 오신 것을 환영합니다.</p>
            </div>
            <form class="login-form" id="loginForm">
                <div class="input-group">
                    <label>이메일</label>
                    <input type="email" id="loginEmail" placeholder="email@example.com" required>
                </div>
                <div class="input-group">
                    <label>비밀번호</label>
                    <input type="password" id="loginPassword" placeholder="Password" required>
                </div>
                <p id="loginError" style="color:red;font-size:0.88rem;margin:4px 0 0 0;"></p>
                <button type="submit" class="btn btn-gradient btn-full">로그인</button>
                
                <div class="social-login-divider">
                    <span>또는</span>
                </div>
                <div class="social-login-actions">
                    <button type="button" class="btn btn-social btn-zest" id="signupZest">
                        제스트 회원가입하기
                    </button>
                    <button type="button" class="btn btn-social btn-google" id="loginGoogle">
                        <img src="https://www.google.com/favicon.ico" alt="Google" class="social-icon"> 구글로 로그인하기
                    </button>
                    <button type="button" class="btn btn-social btn-naver" id="loginNaver">
                        <img src="https://www.naver.com/favicon.ico" alt="Naver" class="social-icon"> 네이버로 가입하기
                    </button>
                </div>
                <div style="margin-top: 20px; text-align: center;">
                    <a href="admin.html" style="font-size: 0.9rem; font-weight: 600; color: var(--text-muted); text-decoration: underline;">관리자 로그인</a>
                </div>
            </form>
        </div>
    </div>

    <script type="module" src="app.js"></script>
    <script type="module">
        import { supabase } from './supabaseClient.js';

        const categoryMap = {
            'Manual': '사용매뉴얼', 'Vocabulary': '어휘', 'School': '내신정복', 'Mistakes': '최다오답15',
            'Mock': '모의고사', 'Middle': '중등교과서', 'High': '고등교과서'
        };

        const urlParams = new URLSearchParams(window.location.search);
        const catKey = urlParams.get('category') || '';
        const catName = categoryMap[catKey] || '전체 자료';
        document.getElementById('boardCategoryTitle').innerText = catName + ' 자료실';

        // Pre-select category in upload form if category is in URL
        const fileCategoryEl = document.getElementById('fileCategory');
        if (catKey && fileCategoryEl) fileCategoryEl.value = catKey;

        // Auto-fill title from filename
        document.getElementById('fileInput').addEventListener('change', (e) => {
            const titleEl = document.getElementById('fileTitle');
            if (e.target.files[0] && !titleEl.value.trim()) {
                titleEl.value = e.target.files[0].name.replace(/\.[^.]+$/, '');
            }
        });

        // Check if user is logged in
        const { data: { session } } = await supabase.auth.getSession();
        const loginModal = document.getElementById('loginModal');

        if (session) {
            document.getElementById('adminBar').style.display = 'flex';
            document.getElementById('adminBarEmail').textContent = '👤 사용자: ' + session.user.email;
            // Only show upload panel for specific admin email or just show it for now as per previous logic
            // (Assuming any logged in user can currently see it or we keep it as is)
            document.getElementById('adminUploadPanel').style.display = 'block';
            document.getElementById('checkCol').style.display = 'table-cell';
            document.getElementById('deleteSelectedBtn').style.display = 'inline-block';
        } else {
            document.getElementById('deleteSelectedBtn').style.display = 'none';
        }

        // Logout
        document.getElementById('logoutBtn').addEventListener('click', async () => {
            await supabase.auth.signOut();
            window.location.reload();
        });

        // File Upload
        function sanitizeFileName(name) {
            return name
                .normalize('NFD') // decompose Unicode
                .replace(/[\u0300-\u036f]/g, '') // strip diacritics
                .replace(/[^a-zA-Z0-9._\-]/g, '_') // replace other special chars with _
                .replace(/_+/g, '_') // collapse multiple underscores
                .replace(/^_|_$/g, ''); // trim leading/trailing underscores
        }

        document.getElementById('uploadForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const statusEl = document.getElementById('uploadStatus');
            const category = document.getElementById('fileCategory').value;
            const fileTitleInput = document.getElementById('fileTitle').value.trim();
            const files = document.getElementById('fileInput').files;

            if (!category || files.length === 0) {
                statusEl.textContent = '카테고리와 파일을 선택해주세요.';
                statusEl.className = 'status-msg err';
                return;
            }

            statusEl.className = 'status-msg';
            let successCount = 0;

            for (let i = 0; i < files.length; i++) {
                const file = files[i];
                const currentTitle = (files.length === 1 && fileTitleInput) ? fileTitleInput : file.name.replace(/\.[^.]+$/, '');
                
                statusEl.textContent = `업로드 중 (${i + 1}/${files.length}): ${currentTitle}...`;

                const safeName = sanitizeFileName(file.name);
                const filePath = `${category}/${Date.now()}_${i}_${safeName}`;

                const { error: storageError } = await supabase.storage
                    .from('documents').upload(filePath, file);

                if (storageError) {
                    statusEl.textContent = `저장 오류 (${file.name}): ` + storageError.message;
                    statusEl.className = 'status-msg err';
                    break; 
                }

                const { error: dbError } = await supabase.from('files')
                    .insert({ title: currentTitle, category, file_path: filePath });

                if (dbError) {
                    statusEl.textContent = `DB 오류 (${file.name}): ` + dbError.message;
                    statusEl.className = 'status-msg err';
                    break;
                }
                successCount++;
            }

            if (successCount === files.length) {
                statusEl.textContent = `✅ 총 ${successCount}개의 자료 업로드 완료!`;
                statusEl.className = 'status-msg ok';
                document.getElementById('uploadForm').reset();
                if (catKey) document.getElementById('fileCategory').value = catKey;
                await loadFiles();
            }
        });

        // Load Files from Supabase
        async function loadFiles(searchTerm = '') {
            const tbody = document.getElementById('boardContent');
            tbody.innerHTML = '<tr><td colspan="4" class="loading-msg">📂 자료를 불러오는 중...</td></tr>';

            let query = supabase.from('files').select('*').order('created_at', { ascending: false });
            if (catKey) query = query.eq('category', catKey);
            if (searchTerm) query = query.ilike('title', `%${searchTerm}%`);

            const { data, error } = await query;

            if (error) {
                tbody.innerHTML = `<tr><td colspan="4" class="loading-msg" style="color:red;">오류: ${error.message}</td></tr>`;
                return;
            }
            if (!data || data.length === 0) {
                tbody.innerHTML = '<tr><td colspan="4" class="loading-msg">등록된 자료가 없습니다.</td></tr>';
                return;
            }

            tbody.innerHTML = '';
            data.forEach((file, i) => {
                const ext = file.file_path.split('.').pop().toLowerCase();
                const badgeClass = ext === 'pdf' ? 'badge-pdf' : ext === 'hwp' ? 'badge-hwp' : 'badge-docx';
                const date = new Date(file.created_at).toLocaleDateString('ko-KR');
                const { data: urlData } = supabase.storage.from('documents').getPublicUrl(file.file_path);

                const tr = document.createElement('tr');
                let actionHtml = '';
                let checkHtml = '';
                
                if (session) {
                    actionHtml = `<a class="download-btn" href="${urlData.publicUrl}" download target="_blank">↓ 다운로드</a>`;
                    actionHtml += ` <button class="delete-btn" onclick="window.deleteFile('${file.id}', '${file.file_path}')">삭제</button>`;
                    checkHtml = `<td><input type="checkbox" class="file-check" data-id="${file.id}" data-path="${file.file_path}"></td>`;
                } else {
                    actionHtml = `<button class="lock-btn">🔒 로그인 후 다운로드</button>`;
                }

                tr.innerHTML = `
                    ${checkHtml}
                    <td>${data.length - i}</td>
                    <td class="title-cell"><span class="badge-type ${badgeClass}">${ext.toUpperCase()}</span>${file.title}</td>
                    <td>${date}</td>
                    <td>${actionHtml}</td>
                `;

                // Add click listener to lock-btn to open modal
                const lb = tr.querySelector('.lock-btn');
                if (lb) {
                    lb.onclick = () => {
                        if (loginModal) loginModal.classList.add('active');
                    };
                }

                tbody.appendChild(tr);
            });
        }

        // Select All checkboxes
        document.getElementById('selectAll')?.addEventListener('change', (e) => {
            document.querySelectorAll('.file-check').forEach(cb => cb.checked = e.target.checked);
        });

        // Delete Selected
        document.getElementById('deleteSelectedBtn')?.addEventListener('click', async () => {
            const selected = Array.from(document.querySelectorAll('.file-check:checked'));
            if (selected.length === 0) {
                alert('삭제할 자료를 선택해 주세요.');
                return;
            }

            if (!confirm(`선택한 ${selected.length}개의 자료를 정말 삭제하시겠습니까?`)) return;

            const ids = selected.map(cb => cb.dataset.id);
            const paths = selected.map(cb => cb.dataset.path);

            // Delete from Storage
            const { error: storageError } = await supabase.storage.from('documents').remove(paths);
            if (storageError) {
                alert('파일 삭제 중 오류가 발생했습니다: ' + storageError.message);
            }

            // Delete from DB
            const { error: dbError } = await supabase.from('files').delete().in('id', ids);
            if (dbError) {
                alert('DB 삭제 중 오류가 발생했습니다: ' + dbError.message);
            } else {
                alert('선택한 자료가 모두 삭제되었습니다.');
                loadFiles();
            }
        });

        // Expose delete function to window for the onclick handler
        window.deleteFile = async (id, filePath) => {
            if (!confirm('정말 이 자료를 삭제하시겠습니까?')) return;
            
            // Delete from Storage
            const { error: storageError } = await supabase.storage.from('documents').remove([filePath]);
            if (storageError) {
                alert('파일 삭제 오류: ' + storageError.message);
                return;
            }

            // Delete from DB
            const { error: dbError } = await supabase.from('files').delete().eq('id', id);
            if (dbError) {
                alert('DB 삭제 오류: ' + dbError.message);
            } else {
                alert('자료가 삭제되었습니다.');
                loadFiles();
            }
        };

        loadFiles();

        document.getElementById('searchBtn').addEventListener('click', () => {
            loadFiles(document.getElementById('searchInput').value.trim());
        });
        document.getElementById('searchInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') loadFiles(e.target.value.trim());
        });
    </script>
</body>
</html>
