<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>제스트 - 관리자 페이지</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css">
    <script>
        (function() {
            try {
                const sessionStr = localStorage.getItem('sb-kdyjvqjzmbknfntmgiqr-auth-token');
                if (sessionStr) {
                    const session = JSON.parse(sessionStr);
                    if (session && session.access_token) {
                        document.documentElement.classList.add('logged-in');
                    }
                }
            } catch (e) {}
        })();
    </script>
    <style>
        .admin-wrap {
            max-width: 600px;
            margin: 0 auto;
            background: var(--surface);
            border-radius: 16px;
            padding: 40px;
            box-shadow: var(--shadow-lg);
        }
        .admin-section { margin-top: 32px; }
        .admin-section h3 { font-size: 1.1rem; margin-bottom: 12px; color: var(--text-main); }
        .upload-form { display: flex; flex-direction: column; gap: 12px; }
        .upload-form select,
        .upload-form input[type="text"],
        .upload-form input[type="file"] {
            padding: 10px 14px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 1rem;
            background: var(--bg-color);
            color: var(--text-main);
        }
        .status-msg { margin-top: 8px; font-size: 0.9rem; font-weight: 600; }
        .status-msg.ok { color: #16a34a; }
        .status-msg.err { color: #dc2626; }

        #loginSection, #uploadSection { transition: all 0.3s; }
    </style>
</head>
<body style="background: var(--bg-color);">
    <header class="header">
        <div class="container nav-container">
            <a href="index.html" class="brand-logo" style="display: flex; align-items: center; gap: 8px;">
                <span class="zest-brand">ZEST ENGLISH BANK</span>
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="home-icon"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
            </a>
            <nav class="main-nav">
                <div class="header-actions">
                    <a href="#" class="nav-link outline-link" id="loginBtn">Login</a>
                </div>
            </nav>
        </div>
    </header>

    <section style="padding-top: 150px; min-height: 100vh;">
        <div class="container">
            <div class="admin-wrap">
                <div class="badge">관리자 전용</div>
                <h2 class="section-title" style="margin-top:10px;">관리자 로그인</h2>

                <!-- Login Section -->
                <div id="loginSection">
                    <form id="adminLoginForm" style="display:flex; flex-direction: column; gap: 14px; margin-top:20px;">
                        <div class="input-group">
                            <label>이메일</label>
                            <input type="email" id="adminEmail" placeholder="admin@example.com" required>
                        </div>
                        <div class="input-group">
                            <label>비밀번호</label>
                            <input type="password" id="adminPassword" placeholder="Password" required>
                        </div>
                        <p id="adminError" class="status-msg err"></p>
                        <button type="submit" class="btn btn-gradient btn-full">로그인</button>
                    </form>
                </div>

                <!-- Dashboard Section (shown after login) -->
                <div id="dashboardSection" style="display:none; text-align: center;">
                    <p class="status-msg ok" id="welcomeMsg" style="margin-bottom: 24px;"></p>

                    <div class="admin-section" style="display: flex; gap: 16px; margin-bottom: 24px; justify-content: center;">
                        <button onclick="location.href='admin_members.html'" class="btn btn-gradient" style="flex: 1; padding: 24px 16px; font-size: 1.2rem; display: flex; flex-direction: column; align-items: center; gap: 12px; background: linear-gradient(135deg, #10b981, #059669);">
                            <span style="font-size: 2rem;">👥</span>
                            회원관리
                        </button>
                        <button onclick="location.href='admin_categories.html'" class="btn btn-gradient" style="flex: 1; padding: 24px 16px; font-size: 1.2rem; display: flex; flex-direction: column; align-items: center; gap: 12px;">
                            <span style="font-size: 2rem;">📂</span>
                            자료실
                        </button>
                    </div>

                    <div class="admin-section">
                        <button class="btn btn-outline" id="logoutBtn" style="width:100%; margin-top: 10px;">로그아웃</button>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <script type="module">
        import { supabase } from './supabaseClient.js';

        const loginSection = document.getElementById('loginSection');
        const dashboardSection = document.getElementById('dashboardSection');
        const adminLoginForm = document.getElementById('adminLoginForm');
        const adminError = document.getElementById('adminError');
        const welcomeMsg = document.getElementById('welcomeMsg');
        const logoutBtn = document.getElementById('logoutBtn');

        // Check if already logged in
        const { data: { session } } = await supabase.auth.getSession();
        if (session) {
            showDashboardPanel(session.user.email);
        }

        function showDashboardPanel(email) {
            loginSection.style.display = 'none';
            dashboardSection.style.display = 'block';
            welcomeMsg.textContent = '✅ 환영합니다, 관리자님! (' + email + ')';
        }

        // Admin Login
        adminLoginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            adminError.textContent = '';
            const email = document.getElementById('adminEmail').value.trim();
            const password = document.getElementById('adminPassword').value;

            const { data, error } = await supabase.auth.signInWithPassword({ email, password });
            if (error) {
                adminError.textContent = '로그인 실패: ' + error.message;
            } else {
                showDashboardPanel(data.session.user.email);
            }
        });

        // Logout
        logoutBtn.addEventListener('click', async () => {
            await supabase.auth.signOut();
            dashboardSection.style.display = 'none';
            loginSection.style.display = 'block';
            welcomeMsg.textContent = '';
        });
    </script>
</body>
</html>
