<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>제스트 - 관리자 페이지</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css">
    <style>
        .admin-wrap {
            max-width: 600px;
            margin: 0 auto;
            background: var(--surface);
            border-radius: 16px;
            padding: 40px;
            box-shadow: var(--shadow-lg);
        }
        .admin-section { margin-top: 32px; }
        .admin-section h3 { font-size: 1.1rem; margin-bottom: 12px; color: var(--text-main); }
        .upload-form { display: flex; flex-direction: column; gap: 12px; }
        .upload-form select,
        .upload-form input[type="text"],
        .upload-form input[type="file"] {
            padding: 10px 14px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 1rem;
            background: var(--bg-color);
            color: var(--text-main);
        }
        .status-msg { margin-top: 8px; font-size: 0.9rem; font-weight: 600; }
        .status-msg.ok { color: #16a34a; }
        .status-msg.err { color: #dc2626; }

        #loginSection, #uploadSection { transition: all 0.3s; }
    </style>
</head>
<body style="background: var(--bg-color);">
    <header class="header">
        <div class="container nav-container">
            <a href="index.html" class="brand-logo">
                <span class="zest-brand">ZEST ENGLISH BANK</span>
            </a>
            <nav class="main-nav">
                <ul class="nav-list">
                    <li><a href="index.html" class="nav-link">← 메인으로</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <section style="padding-top: 150px; min-height: 100vh;">
        <div class="container">
            <div class="admin-wrap">
                <div class="badge">관리자 전용</div>
                <h2 class="section-title" style="margin-top:10px;">관리자 로그인</h2>

                <!-- Login Section -->
                <div id="loginSection">
                    <form id="adminLoginForm" style="display:flex; flex-direction: column; gap: 14px; margin-top:20px;">
                        <div class="input-group">
                            <label>이메일</label>
                            <input type="email" id="adminEmail" placeholder="admin@example.com" required>
                        </div>
                        <div class="input-group">
                            <label>비밀번호</label>
                            <input type="password" id="adminPassword" placeholder="Password" required>
                        </div>
                        <p id="adminError" class="status-msg err"></p>
                        <button type="submit" class="btn btn-gradient btn-full">로그인</button>
                    </form>
                </div>

                <!-- Upload Section (shown after login) -->
                <div id="uploadSection" style="display:none;">
                    <p class="status-msg ok" id="welcomeMsg"></p>

                    <div class="admin-section">
                        <h3>📂 자료 파일 업로드</h3>
                        <form class="upload-form" id="uploadForm">
                            <select id="fileCategory" required>
                                <option value="">카테고리 선택</option>
                                <option value="Vocabulary">어휘자료</option>
                                <option value="School">내신정복</option>
                                <option value="Mistakes">최다오답15</option>
                                <option value="Mock">모의고사</option>
                                <option value="Middle">중등교과서</option>
                                <option value="High">고등교과서</option>
                            </select>
                            <input type="text" id="fileTitle" placeholder="문서 제목 입력" required>
                            <input type="file" id="fileInput" accept=".pdf,.hwp,.docx" required>
                            <button type="submit" class="btn btn-gradient">업로드</button>
                            <p id="uploadStatus" class="status-msg"></p>
                        </form>
                    </div>

                    <div class="admin-section">
                        <button class="btn btn-outline" id="logoutBtn" style="width:100%; margin-top: 10px;">로그아웃</button>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <script type="module">
        import { supabase } from './supabaseClient.js';

        const loginSection = document.getElementById('loginSection');
        const uploadSection = document.getElementById('uploadSection');
        const adminLoginForm = document.getElementById('adminLoginForm');
        const adminError = document.getElementById('adminError');
        const welcomeMsg = document.getElementById('welcomeMsg');
        const uploadForm = document.getElementById('uploadForm');
        const uploadStatus = document.getElementById('uploadStatus');
        const logoutBtn = document.getElementById('logoutBtn');

        // Check if already logged in
        const { data: { session } } = await supabase.auth.getSession();
        if (session) {
            showUploadPanel(session.user.email);
        }

        function showUploadPanel(email) {
            loginSection.style.display = 'none';
            uploadSection.style.display = 'block';
            welcomeMsg.textContent = '✅ 로그인됨: ' + email;
        }

        // Admin Login
        adminLoginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            adminError.textContent = '';
            const email = document.getElementById('adminEmail').value.trim();
            const password = document.getElementById('adminPassword').value;

            const { data, error } = await supabase.auth.signInWithPassword({ email, password });
            if (error) {
                adminError.textContent = '로그인 실패: ' + error.message;
            } else {
                // Redirect to resource room (trial page) as admin
                window.location.href = 'trial.html';
            }
        });

        // File Upload to Supabase Storage
        uploadForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            uploadStatus.textContent = '업로드 중...';
            uploadStatus.className = 'status-msg';

            const category = document.getElementById('fileCategory').value;
            const title = document.getElementById('fileTitle').value.trim();
            const file = document.getElementById('fileInput').files[0];

            if (!category || !title || !file) {
                uploadStatus.textContent = '모든 항목을 입력해 주세요.';
                uploadStatus.className = 'status-msg err';
                return;
            }

            const filePath = `${category}/${Date.now()}_${file.name}`;

            // Upload to Storage
            const { error: storageError } = await supabase.storage
                .from('documents')
                .upload(filePath, file);

            if (storageError) {
                uploadStatus.textContent = '업로드 오류: ' + storageError.message;
                uploadStatus.className = 'status-msg err';
                return;
            }

            // Insert record into 'files' DB table
            const { error: dbError } = await supabase
                .from('files')
                .insert({ title, category, file_path: filePath });

            if (dbError) {
                uploadStatus.textContent = 'DB 저장 오류: ' + dbError.message;
                uploadStatus.className = 'status-msg err';
            } else {
                uploadStatus.textContent = '✅ 업로드 완료!';
                uploadStatus.className = 'status-msg ok';
                uploadForm.reset();
            }
        });

        // Logout
        logoutBtn.addEventListener('click', async () => {
            await supabase.auth.signOut();
            uploadSection.style.display = 'none';
            loginSection.style.display = 'block';
            welcomeMsg.textContent = '';
        });
    </script>
</body>
</html>
